{% extends "base.html" %}
{% block title %}{{ season }} Rules — NFL Picks Pool{% endblock %}

{% block content %}
<style>
  #rules-body h1 { font-size: 1.5rem; font-weight: 700; margin: 1.5rem 0 0.75rem; }
  #rules-body h2 { font-size: 1.25rem; font-weight: 700; margin: 1.25rem 0 0.5rem; color: #111827; }
  #rules-body h3 { font-size: 1.1rem; font-weight: 600; margin: 1rem 0 0.4rem; color: #374151; }
  #rules-body p  { margin: 0 0 0.75rem; line-height: 1.65; color: #374151; }
  #rules-body ul { list-style: disc; padding-left: 1.5rem; margin: 0 0 0.75rem; color: #374151; }
  #rules-body ol { list-style: decimal; padding-left: 1.5rem; margin: 0 0 0.75rem; color: #374151; }
  #rules-body li { margin-bottom: 0.25rem; }
  #rules-body strong { font-weight: 700; }
  #rules-body em { font-style: italic; }
  #rules-body hr { border: none; border-top: 1px solid #e5e7eb; margin: 1.5rem 0; }
  #rules-body table { width: 100%; border-collapse: collapse; margin-bottom: 1rem; font-size: 0.875rem; }
  #rules-body th { background: #f9fafb; border-bottom: 2px solid #e5e7eb; padding: 8px 12px; text-align: left; font-weight: 600; color: #6b7280; }
  #rules-body td { border-bottom: 1px solid #f3f4f6; padding: 8px 12px; color: #374151; }
  #rules-body code { background: #f3f4f6; padding: 1px 5px; border-radius: 4px; font-family: monospace; font-size: 0.875em; }
</style>

<div class="mb-6 flex items-center justify-between">
  <h1 class="text-2xl font-bold">{{ season }} Pool Rules</h1>
  <span class="text-xs text-gray-400">Official rulebook</span>
</div>

<div class="bg-white rounded-xl border border-gray-100 shadow-sm p-6 max-w-none" id="rules-body">
  <noscript><pre class="text-xs whitespace-pre-wrap">{{ raw_md }}</pre></noscript>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
  document.getElementById('rules-body').innerHTML = marked.parse({{ raw_md | tojson }});
</script>
{% endblock %}
