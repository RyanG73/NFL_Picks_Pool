<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}NFL Picks Pool{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            nfl: { green: '#013369', gold: '#D4AF37', red: '#D50A0A' }
          }
        }
      }
    }
  </script>
  <style>
    .eliminated { opacity: 0.45; }
    .win-cell   { background-color: #dcfce7; }
    .loss-cell  { background-color: #fee2e2; }
    .push-cell  { background-color: #fef9c3; }
  </style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen">

  <!-- Top nav -->
  <header class="bg-nfl-green text-white shadow-md sticky top-0 z-50">
    <div class="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">
      <a href="/" class="font-bold text-lg tracking-tight">🏈 NFL Picks Pool</a>
      <nav class="flex gap-4 text-sm font-medium">
        <a href="/" class="hover:text-yellow-300">Standings</a>
        <a href="/week/{{ week | default(1) }}" class="hover:text-yellow-300">This Week</a>
        <a href="/rules" class="hover:text-yellow-300">Rules</a>
      </nav>
    </div>
  </header>

  {% if banner %}
  <div class="bg-yellow-100 border-b border-yellow-300 px-4 py-2 text-center text-sm font-medium text-yellow-900">
    {{ banner.banner_text }}
  </div>
  {% endif %}

  <main class="max-w-5xl mx-auto px-4 py-6">
    {% block content %}{% endblock %}
  </main>

  <footer class="text-center text-xs text-gray-400 py-6">
    NFL Picks Pool · $50 buy-in · 25,000 starting points · Questions? Venmo @Ryan-Gerda
  </footer>
  {% block extra_scripts %}{% endblock %}
</body>
</html>
