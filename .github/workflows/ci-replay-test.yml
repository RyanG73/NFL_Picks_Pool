name: Replay Test — Settlement Logic Validation

on:
  push:
    branches: [main]
    paths:
      - 'api/lib/settlement.py'
      - 'jobs/replay_test.py'
      - 'jobs/settle_week.py'
  pull_request:
    paths:
      - 'api/lib/settlement.py'
      - 'jobs/replay_test.py'
      - 'jobs/settle_week.py'
  workflow_dispatch:

jobs:
  replay:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: Run 2025 replay test
        run: python jobs/replay_test.py --season 2025 --show-diffs
