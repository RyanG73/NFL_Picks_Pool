name: Wed — Pull Spreads & Send Email

on:
  schedule:
    # Wednesday 08:00 ET = 13:00 UTC (during DST) / 12:00 UTC (non-DST)
    # Running at both to handle DST transition; pull_spreads is idempotent
    - cron: '0 13 * * 3'
  workflow_dispatch:
    inputs:
      week:
        description: 'Week number (1-22)'
        required: true
        type: number
      dry_run:
        description: 'Dry run (no writes, no emails)'
        type: boolean
        default: false

jobs:
  pull-spreads:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: Pull spreads and send Wednesday email
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          FROM_NAME: ${{ secrets.FROM_NAME }}
          APP_URL: ${{ secrets.APP_URL }}
          CURRENT_SEASON: ${{ vars.CURRENT_SEASON }}
        run: |
          WEEK="${{ inputs.week || '' }}"
          DRY_RUN="${{ inputs.dry_run == 'true' && '--dry-run' || '' }}"
          # Auto-detect week from current date if not provided
          if [ -z "$WEEK" ]; then
            WEEK=$(python -c "
          import nfl_data_py as nfl, pandas as pd, datetime as dt
          sched = nfl.import_schedules([int('$CURRENT_SEASON')])
          today = dt.date.today()
          future = sched[pd.to_datetime(sched['gameday']).dt.date >= today]
          print(future['week'].min() if len(future) else 1)
          ")
          fi
          python jobs/pull_spreads.py --week "$WEEK" --season "$CURRENT_SEASON" $DRY_RUN
