name: Hourly — Detect Game Cancellations

on:
  schedule:
    # Every hour, Wed through Tue game week
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      week:
        description: 'Week number (leave blank to auto-detect from DB)'
        required: false
        type: number

jobs:
  detect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: Check ESPN for postponed/cancelled games
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          FROM_NAME: ${{ secrets.FROM_NAME }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          APP_URL: ${{ secrets.APP_URL }}
          CURRENT_SEASON: ${{ vars.CURRENT_SEASON }}
        run: |
          WEEK="${{ inputs.week }}"
          if [ -z "$WEEK" ]; then
            WEEK=$(python -c "
import os, sys; sys.path.insert(0,'.')
from api.lib import db
print(db.detect_current_week(int(os.environ.get('CURRENT_SEASON', 2026))))
")
          fi
          python jobs/detect_cancellations.py \
            --week "$WEEK" \
            --season "$CURRENT_SEASON"
