name: Tue — Settle Week

on:
  schedule:
    # Tuesday 09:00 ET = Tuesday 14:00 UTC (DST)
    - cron: '0 14 * * 2'
  workflow_dispatch:
    inputs:
      week:
        description: 'Week number to settle'
        required: true
        type: number
      dry_run:
        description: 'Dry run (no writes)'
        type: boolean
        default: false

jobs:
  settle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: Settle picks against final scores
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          CURRENT_SEASON: ${{ vars.CURRENT_SEASON }}
        run: |
          python jobs/settle_week.py \
            --week "${{ inputs.week }}" \
            --season "$CURRENT_SEASON" \
            ${{ inputs.dry_run == 'true' && '--dry-run' || '' }}
