name: Sat — Lock Picks & Reveal Email

on:
  schedule:
    # 17:59 UTC Sat = 1:59pm EDT (regular season) / 12:59pm EST (playoffs)
    # Always after the noon ET deadline so penalty check and reveal email are correct.
    - cron: '59 17 * * 6'
  workflow_dispatch:
    inputs:
      week:
        description: 'Week number (leave blank to auto-detect from DB)'
        required: false
        type: number
      dry_run:
        type: boolean
        default: false

jobs:
  lock-and-reveal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: Apply no-bet penalties and send picks reveal email
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          FROM_NAME: ${{ secrets.FROM_NAME }}
          APP_URL: ${{ secrets.APP_URL }}
          CURRENT_SEASON: ${{ vars.CURRENT_SEASON }}
        run: |
          WEEK="${{ inputs.week }}"
          if [ -z "$WEEK" ]; then
            WEEK=$(python -c "
import os, sys; sys.path.insert(0,'.')
from api.lib import db
print(db.detect_current_week(int(os.environ.get('CURRENT_SEASON', 2026))))
")
          fi
          python jobs/lock_and_reveal.py \
            --week "$WEEK" \
            --season "$CURRENT_SEASON" \
            ${{ inputs.dry_run == 'true' && '--dry-run' || '' }}
