name: Game Day — Poll Live Scores

on:
  schedule:
    # Thu 18:00–23:00 ET, Sun 13:00–23:00 ET, Mon 20:00–23:00 ET
    # GitHub Actions cron is minute-level; run every minute during windows
    # We use a 5-minute interval and rely on poll_live_scores --once for simplicity
    - cron: '*/5 18-23 * * 4'   # Thursday
    - cron: '*/5 17-23 * * 0'   # Sunday (17 UTC = 13 ET DST)
    - cron: '*/5 0-4  * * 1'    # Sunday late / Monday morning UTC
    - cron: '*/5 0-4  * * 5'    # Thursday late UTC
  workflow_dispatch:
    inputs:
      week:
        description: 'Week number'
        required: true
        type: number

jobs:
  poll-scores:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: Fetch live scores from ESPN
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          CURRENT_SEASON: ${{ vars.CURRENT_SEASON }}
        run: |
          python jobs/poll_live_scores.py \
            --week "${{ inputs.week || 1 }}" \
            --season "$CURRENT_SEASON" \
            --once
