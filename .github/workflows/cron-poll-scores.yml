name: Game Day — Poll Live Scores

on:
  schedule:
    # All times UTC. ET offsets: EDT = UTC-4 (Mar–Nov), EST = UTC-5 (Nov–Mar).
    # Game windows (ET): Thu 6pm, Sat noon (playoffs), Sun 1pm, Mon 8pm, Fri occasional
    - cron: '*/5 18-23 * * 4'   # Thursday 18:00–23:59 UTC (Thu 2–7pm ET)
    - cron: '*/5 0-4  * * 5'    # Thursday late / Friday morning UTC (Thu 8pm–Fri midnight ET)
    - cron: '*/5 16-23 * * 6'   # Saturday playoff games (Sat noon–midnight ET; EST=UTC-5)
    - cron: '*/5 0-5  * * 0'    # Saturday late rollover into Sunday UTC (Sat 7pm–midnight ET)
    - cron: '*/5 17-23 * * 0'   # Sunday 17:00–23:59 UTC (Sun 1–7pm ET)
    - cron: '*/5 0-4  * * 1'    # Sunday late / Monday morning UTC (Sun 8pm–Mon midnight ET)
    - cron: '*/5 0-4  * * 2'    # Monday Night Football (Mon 8pm–Tue midnight ET)
    - cron: '*/5 17-23 * * 5'   # Friday games (occasional; covers 1–7pm ET window)
  workflow_dispatch:
    inputs:
      week:
        description: 'Week number (leave blank to auto-detect from DB)'
        required: false
        type: number

jobs:
  poll-scores:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: Fetch live scores from ESPN
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          CURRENT_SEASON: ${{ vars.CURRENT_SEASON }}
        run: |
          WEEK_ARG=""
          if [ -n "${{ inputs.week }}" ]; then
            WEEK_ARG="--week ${{ inputs.week }}"
          fi
          python jobs/poll_live_scores.py \
            $WEEK_ARG \
            --season "$CURRENT_SEASON" \
            --once
