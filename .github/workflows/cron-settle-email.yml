name: Tue — Settlement Results Email

on:
  schedule:
    # Tuesday 18:00 ET (after settle_week.yml completes at ~14:00 UTC)
    # 18:00 EST = 23:00 UTC; 18:00 EDT = 22:00 UTC — use 23:00 UTC to be safe
    - cron: '0 23 * * 2'
  workflow_dispatch:
    inputs:
      week:
        description: 'Week number (leave blank to auto-detect from DB)'
        required: false
        type: number
      dry_run:
        description: 'Dry run (no emails sent)'
        type: boolean
        default: false

jobs:
  send-results:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: Send settlement results emails
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          FROM_NAME: ${{ secrets.FROM_NAME }}
          APP_URL: ${{ secrets.APP_URL }}
          CURRENT_SEASON: ${{ vars.CURRENT_SEASON }}
        run: |
          WEEK="${{ inputs.week }}"
          if [ -z "$WEEK" ]; then
            WEEK=$(python -c "
import os, sys; sys.path.insert(0,'.')
from api.lib import db
print(db.detect_current_week(int(os.environ.get('CURRENT_SEASON', 2026))))
")
          fi
          python jobs/send_settlement_email.py \
            --week "$WEEK" \
            --season "$CURRENT_SEASON" \
            ${{ inputs.dry_run == 'true' && '--dry-run' || '' }}
